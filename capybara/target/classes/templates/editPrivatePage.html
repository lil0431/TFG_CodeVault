<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil | CodeVault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0f172a;
            --secondary-blue: #1e293b;
            --accent-blue: #3b82f6;
            --bright-blue: #60a5fa;
            --dark-bg: #0a0e27;
            --text-light: #e2e8f0;
            --text-grey: #94a3b8;
        }

        body {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--primary-blue) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            padding: 40px 0;
        }
        
        body > div {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .edit-container {
            background: linear-gradient(135deg, var(--secondary-blue), var(--primary-blue));
            border: 2px solid var(--accent-blue);
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(59, 130, 246, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
        }

        .edit-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .edit-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .edit-icon {
            font-size: 4rem;
            color: var(--bright-blue);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px var(--accent-blue));
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 15px var(--accent-blue)); }
            to { filter: drop-shadow(0 0 25px var(--bright-blue)); }
        }

        .edit-header h2 {
            font-size: 2rem;
            color: var(--text-light);
            text-shadow: 0 0 10px var(--accent-blue);
            margin-bottom: 10px;
        }

        .classification-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent-blue), var(--secondary-blue));
            color: var(--text-light);
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid var(--bright-blue);
            margin-top: 10px;
        }

        .normal-form {
            position: relative;
            z-index: 1;
        }

        .error-message {
            background: rgba(59, 130, 246, 0.2);
            color: var(--bright-blue);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--bright-blue);
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .error-message i {
            margin-right: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group label i {
            margin-right: 8px;
            color: var(--bright-blue);
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--accent-blue);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--bright-blue);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .form-group input::placeholder {
            color: var(--text-grey);
        }

        .readonly-field {
            background: rgba(59, 130, 246, 0.05);
            border: 2px solid var(--accent-blue);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 25px;
        }

        .readonly-field label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .readonly-field label i {
            margin-right: 8px;
            color: var(--bright-blue);
        }

        .readonly-value {
            color: var(--text-light);
            font-size: 1.1rem;
            font-weight: bold;
            padding: 5px 0;
        }

        .password-hint {
            display: block;
            color: var(--text-grey);
            font-size: 0.85rem;
            margin-top: 8px;
            padding: 10px;
            background: rgba(59, 130, 246, 0.1);
            border-left: 2px solid var(--bright-blue);
            border-radius: 4px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue), var(--bright-blue));
            color: var(--text-light);
            border: 1px solid var(--bright-blue);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--bright-blue), var(--accent-blue));
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(59, 130, 246, 0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary-blue), var(--primary-blue));
            color: var(--text-light);
            border: 2px solid var(--accent-blue);
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            border-color: var(--bright-blue);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }

        .back-link a {
            color: var(--text-grey);
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.95rem;
        }

        .back-link a:hover {
            color: var(--bright-blue);
        }

        .back-link i {
            margin-right: 5px;
        }

        .security-notice {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid var(--accent-blue);
            border-radius: 8px;
            padding: 15px;
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-grey);
            position: relative;
            z-index: 1;
        }

        .security-notice i {
            color: var(--bright-blue);
            margin-right: 8px;
        }

        @media (max-width: 650px) {
            .edit-container {
                padding: 40px 25px;
            }

            .edit-header h2 {
                font-size: 1.5rem;
            }

            .edit-icon {
                font-size: 3rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="edit-container">
        <div class="edit-header">
            <div class="edit-icon">
                <i class="fas fa-user-edit"></i>
            </div>
            <h2>Editar Perfil</h2>
            <span class="classification-badge">
                <i class="fas fa-lock"></i> SEGURO
            </span>
        </div>

        <form class="normal-form" action="/users/{{user.id}}/edit" method="post" enctype="multipart/form-data">
            {{>csrf}}
            
            {{#error}}
            <div class="error-message">
                <i class="fas fa-exclamation-triangle"></i>{{error}}
            </div>
            {{/error}}

            <div class="readonly-field">
                <label><i class="fas fa-user"></i>Nombre de Usuario</label>
                <div class="readonly-value">{{user.username}}</div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-key"></i>Nueva Contraseña</label>
                <input name="password" type="password" placeholder="Dejar en blanco para mantener la actual">
                <span class="password-hint">Solo completa si deseas cambiar tu contraseña</span>
            </div>

            <div class="form-group">
                <label><i class="fas fa-check-double"></i>Confirmar Nueva Contraseña</label>
                <input name="confirmPassword" type="password" placeholder="Repite la nueva contraseña">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-id-badge"></i>Nombre</label>
                    <input name="name" type="text" placeholder="Nombre" 
                           value="{{#user.name}}{{user.name}}{{/user.name}}">
                </div>

                <div class="form-group">
                    <label><i class="fas fa-id-badge"></i>Apellido</label>
                    <input name="lastName" type="text" placeholder="Apellido" 
                           value="{{#user.lastName}}{{user.lastName}}{{/user.lastName}}">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i>Correo Electrónico</label>
                <input name="email" type="email" placeholder="usuario@dominio.com" 
                       value="{{#user.email}}{{user.email}}{{/user.email}}">
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Guardar Cambios
                </button>
                <button type="button" class="btn btn-secondary" onclick="location.href='/me'">
                    <i class="fas fa-times"></i> Cancelar
                </button>
            </div>
        </form>

        <div class="back-link">
            <a href="/me">
                <i class="fas fa-arrow-left"></i> Volver a mi perfil
            </a>
        </div>

        <div class="security-notice">
            <i class="fas fa-shield-alt"></i>
            Todos los cambios quedan registrados en el sistema de auditoría.
        </div>
    </div>
</body>
</html>
