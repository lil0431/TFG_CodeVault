<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página No Encontrada | CodeVault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0f172a;
            --secondary-blue: #1e293b;
            --accent-blue: #3b82f6;
            --bright-blue: #60a5fa;
            --dark-bg: #0a0e27;
            --text-light: #e2e8f0;
            --text-grey: #94a3b8;
        }

        body {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--primary-blue) 100%);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(0deg, rgba(59, 130, 246, 0.03) 0px, rgba(59, 130, 246, 0.03) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: -1;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-container {
            max-width: 800px;
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 1;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 20px;
            border: 3px solid var(--accent-blue);
            box-shadow: 0 20px 60px rgba(59, 130, 246, 0.3);
            backdrop-filter: blur(10px);
        }

        .error-logo {
            font-size: 3em;
            color: var(--bright-blue);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                filter: drop-shadow(0 0 20px rgba(59, 130, 246, 0.6));
            }
            50% {
                transform: scale(1.1);
                filter: drop-shadow(0 0 40px rgba(96, 165, 250, 0.9));
            }
        }

        .error-code {
            font-size: 10em;
            font-weight: bold;
            color: var(--bright-blue);
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.8);
            margin: 20px 0;
            line-height: 1;
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0%, 100% {
                text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.8);
            }
            25% {
                text-shadow: -4px 4px 8px rgba(96, 165, 250, 0.8);
            }
            50% {
                text-shadow: 4px -4px 8px rgba(59, 130, 246, 0.8);
            }
            75% {
                text-shadow: -4px -4px 8px rgba(96, 165, 250, 0.8);
            }
        }

        .error-title {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: var(--bright-blue);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
            font-weight: bold;
        }

        .error-message {
            font-size: 1.5em;
            margin-bottom: 15px;
            color: var(--text-light);
            font-weight: 600;
        }

        .error-description {
            font-size: 1.1em;
            color: var(--text-grey);
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .error-svg {
            width: 250px;
            height: 250px;
            margin: 30px auto;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--bright-blue) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary-blue) 0%, var(--primary-blue) 100%);
            color: var(--text-light);
            border: 2px solid var(--accent-blue);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            border-color: var(--bright-blue);
        }

        @media (max-width: 768px) {
            .error-container {
                padding: 20px;
                margin: 20px;
            }

            .error-code {
                font-size: 6em;
            }

            .error-title {
                font-size: 1.8em;
            }

            .button-container {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .error-svg {
                width: 180px;
                height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-logo">
            <i class="fas fa-map-marked-alt"></i>
        </div>

        <div class="error-code">404</div>
        
        <h1 class="error-title">¡Objetivo No Localizado!</h1>
        
        <h2 class="error-message">¿Te has perdido en el arsenal?</h2>
        
        <p class="error-description">
            La página que buscas no existe o ha sido reubicada a una instalación clasificada. <br>
            El GPS militar indica que esta coordenada está fuera de nuestro perímetro de seguridad.
        </p>

        <!-- SVG con GPS perdido -->
        <svg class="error-svg" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
            <!-- Mapa de fondo con líneas -->
            <g opacity="0.3">
                <line x1="0" y1="75" x2="300" y2="75" stroke="#3b82f6" stroke-width="1"/>
                <line x1="0" y1="150" x2="300" y2="150" stroke="#3b82f6" stroke-width="1"/>
                <line x1="0" y1="225" x2="300" y2="225" stroke="#3b82f6" stroke-width="1"/>
                <line x1="75" y1="0" x2="75" y2="300" stroke="#3b82f6" stroke-width="1"/>
                <line x1="150" y1="0" x2="150" y2="300" stroke="#3b82f6" stroke-width="1"/>
                <line x1="225" y1="0" x2="225" y2="300" stroke="#3b82f6" stroke-width="1"/>
            </g>
            
            <!-- Pin de ubicación con signo de interrogación -->
            <g>
                <path d="M 150 100 Q 130 100 130 125 Q 130 150 150 180 Q 170 150 170 125 Q 170 100 150 100" 
                      fill="#60a5fa" stroke="#3b82f6" stroke-width="3">
                    <animateTransform
                        attributeName="transform"
                        attributeType="XML"
                        type="translate"
                        values="0,0; 0,-10; 0,0"
                        dur="2s"
                        repeatCount="indefinite"/>
                </path>
                <circle cx="150" cy="125" r="15" fill="#0a0e27"/>
                <text x="150" y="135" text-anchor="middle" font-size="25" fill="#60a5fa" font-family="Arial" font-weight="bold">?</text>
            </g>
            
            <!-- Ondas de búsqueda -->
            <circle cx="150" cy="125" r="40" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.6">
                <animate attributeName="r" values="40;80;40" dur="3s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.6;0;0.6" dur="3s" repeatCount="indefinite"/>
            </circle>
            <circle cx="150" cy="125" r="60" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.4">
                <animate attributeName="r" values="60;100;60" dur="3s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
            </circle>
            
            <!-- Texto NO SIGNAL -->
            <text x="150" y="230" text-anchor="middle" font-size="18" fill="#3b82f6" font-family="Arial" font-weight="bold">
                NO SIGNAL
                <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
            </text>
        </svg>

        <div class="button-container">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home"></i>
                Base Principal
            </a>
            <a href="javascript:history.back()" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i>
                Regresar
            </a>
        </div>
    </div>
</body>
</html>
