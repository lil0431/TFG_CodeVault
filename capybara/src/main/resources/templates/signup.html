<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario | CodeVault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-blue: #0f172a;
            --secondary-blue: #1e293b;
            --accent-blue: #3b82f6;
            --bright-blue: #60a5fa;
            --dark-bg: #0a0e27;
            --text-light: #e2e8f0;
            --text-grey: #94a3b8;
        }

        body {
            font-family: 'Fira Code', 'Courier New', monospace;
            background: linear-gradient(135deg, var(--dark-bg) 0%, var(--primary-blue) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            padding: 40px 20px;
        }

        .signup-container {
            background: linear-gradient(135deg, var(--secondary-blue), var(--primary-blue));
            border: 2px solid var(--accent-blue);
            border-radius: 15px;
            box-shadow: 0 10px 50px rgba(59, 130, 246, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
        }

        .signup-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            animation: pulse 4s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .signup-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }

        .signup-icon {
            font-size: 4rem;
            color: var(--crimson);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px var(--blood-red));
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { filter: drop-shadow(0 0 15px var(--blood-red)); }
            to { filter: drop-shadow(0 0 25px var(--crimson)); }
        }

        .signup-header h2 {
            font-size: 2rem;
            color: var(--text-light);
            text-shadow: 0 0 10px var(--blood-red);
            margin-bottom: 10px;
        }

        .classification-badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--blood-red), var(--burgundy));
            color: var(--text-light);
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: bold;
            letter-spacing: 1px;
            border: 1px solid var(--crimson);
            margin-top: 10px;
        }

        .normal-form {
            position: relative;
            z-index: 1;
        }

        .error-message {
            background: rgba(220, 20, 60, 0.2);
            color: var(--crimson);
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid var(--crimson);
            margin-bottom: 25px;
            font-size: 0.95rem;
        }

        .error-message i {
            margin-right: 10px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .form-group label i {
            margin-right: 8px;
            color: var(--crimson);
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--burgundy);
            border-radius: 8px;
            color: var(--text-light);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--crimson);
            box-shadow: 0 0 15px rgba(220, 20, 60, 0.3);
            background: rgba(0, 0, 0, 0.6);
        }

        .form-group input::placeholder {
            color: var(--text-grey);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--blood-red), var(--burgundy));
            color: var(--text-light);
            border: 1px solid var(--crimson);
            box-shadow: 0 4px 20px rgba(139, 0, 0, 0.5);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, var(--crimson), var(--blood-red));
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(220, 20, 60, 0.7);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--dark-grey), var(--secondary-dark));
            color: var(--text-light);
            border: 1px solid var(--burgundy);
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, var(--secondary-dark), var(--dark-grey));
            border-color: var(--crimson);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            position: relative;
            z-index: 1;
        }

        .back-link a {
            color: var(--text-grey);
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.95rem;
        }

        .back-link a:hover {
            color: var(--crimson);
        }

        .back-link i {
            margin-right: 5px;
        }

        .security-notice {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--burgundy);
            border-radius: 8px;
            padding: 15px;
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-grey);
            position: relative;
            z-index: 1;
        }

        .security-notice i {
            color: var(--crimson);
            margin-right: 8px;
        }

        @media (max-width: 650px) {
            .signup-container {
                padding: 40px 25px;
            }

            .signup-header h2 {
                font-size: 1.5rem;
            }

            .signup-icon {
                font-size: 3rem;
            }

            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <div class="signup-icon">
                <i class="fas fa-user-shield"></i>
            </div>
            <h2>Registro de Usuario</h2>
            <span class="classification-badge">
                <i class="fas fa-id-card"></i> ACREDITACIÓN REQUERIDA
            </span>
        </div>

        <form class="normal-form" action="/signup" method="post" enctype="multipart/form-data">
            {{>csrf}}
            
            {{#error}}
            <div class="error-message">
                <i class="fas fa-exclamation-triangle"></i>{{error}}
            </div>
            {{/error}}

            <div class="form-group">
                <label><i class="fas fa-user"></i>Nombre de Usuario</label>
                <input name="username" type="text" placeholder="Elija un nombre de usuario único" 
                       value="{{#user.username}}{{user.username}}{{/user.username}}" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-key"></i>Contraseña</label>
                <input name="password" type="password" placeholder="Contraseña segura (mín. 8 caracteres)" required>
            </div>

            <div class="form-group">
                <label><i class="fas fa-check-double"></i>Confirmar Contraseña</label>
                <input name="confirmPassword" type="password" placeholder="Repita su contraseña" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-id-badge"></i>Nombre</label>
                    <input name="name" type="text" placeholder="Nombre" 
                           value="{{#user.name}}{{user.name}}{{/user.name}}" required>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-id-badge"></i>Apellido</label>
                    <input name="lastName" type="text" placeholder="Apellido" 
                           value="{{#user.lastName}}{{user.lastName}}{{/user.lastName}}" required>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-envelope"></i>Correo Electrónico</label>
                <input name="email" type="email" placeholder="usuario@dominio.com" 
                       value="{{#user.email}}{{user.email}}{{/user.email}}" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-user-plus"></i> Registrarse
                </button>
                <button type="button" class="btn btn-secondary" onclick="location.href='/login'">
                    <i class="fas fa-sign-in-alt"></i> Ya tengo cuenta
                </button>
            </div>
        </form>

        <div class="back-link">
            <a href="/">
                <i class="fas fa-arrow-left"></i> Volver al inicio
            </a>
        </div>

        <div class="security-notice">
            <i class="fas fa-shield-alt"></i>
            Sus datos serán protegidos con encriptación de nivel militar. El registro requiere verificación.
        </div>
    </div>
</body>
</html>
